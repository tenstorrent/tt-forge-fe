name: On nightly

on:
  workflow_dispatch:
    inputs:
      rebuild:
        description: 'Rebuild the Forge'
        required: false
        default: false
        type: boolean
      test_group_cnt:
        description: 'Test group count'
        required: false
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "8"
      run_ops_sweeps:
        description: 'Run models ops and sweeps tests'
        required: false
        default: 'No'
        type: choice
        options:
          - 'Yes'
          - 'No'
  # schedule:
  #   - cron: '0 20 * * *'  # Runs at 20:00 UTC every day
  push:
    branches: [ "pchandrasekaran/fix_nightly_job_failures" ]

# Set cache root to avoid IRD_LF_CACHE error when loading CenterNet ONNX model in CI
env:
  DOCKER_CACHE_ROOT: /mnt/dockercache
  IRD_LF_CACHE: ${{ vars.IRD_LF_CACHE }}

permissions:
  packages: write
  checks: write

jobs:

  docker-build:
    uses: ./.github/workflows/build-image.yml
    secrets: inherit

  set-inputs:
    runs-on: ubuntu-latest
    outputs:
      rebuild: ${{ steps.set-inputs.outputs.rebuild }}
      test_group_cnt: ${{ steps.set-inputs.outputs.test_group_cnt }}
      test_group_ids: ${{ steps.set-inputs.outputs.test_group_ids }}
      test_group_ids_os: ${{ steps.set-inputs.outputs.test_group_ids_os }}
      run_ops_sweeps: ${{ steps.set-inputs.outputs.run_ops_sweeps }}
    steps:
      - name: Set Inputs
        id: set-inputs
        run: |
          default_test_group_cnt=8
          default_run_ops_sweeps=Yes

          ros_res=$(if [ -z "${{ inputs.run_ops_sweeps }}" ]; then echo $default_run_ops_sweeps; else echo ${{ inputs.run_ops_sweeps }}; fi)
          if [ -z "${{ inputs.rebuild }}" ]; then
            echo "rebuild=All" >> $GITHUB_OUTPUT
          else
            echo "rebuild=$(if [ ${{ inputs.rebuild }} == 'true' ]; then echo Release; else echo None; fi)" >> $GITHUB_OUTPUT
          fi
          tgc=$(if [ -z "${{ inputs.test_group_cnt }}" ]; then echo $default_test_group_cnt; else echo ${{ inputs.test_group_cnt }}; fi)
          test_group_ids=$(seq -s ',' 1 $tgc)
          echo "test_group_cnt=$tgc" >> $GITHUB_OUTPUT
          echo "test_group_ids=[$test_group_ids]" >> $GITHUB_OUTPUT
          echo "test_group_ids_os=[$test_group_ids]" >> $GITHUB_OUTPUT
          #echo "test_group_ids_os=[$(if [ $ros_res == 'No' ]; then echo; else echo $test_group_ids; fi)]" >> $GITHUB_OUTPUT
          echo "run_ops_sweeps=$(if [ $ros_res == 'No' ]; then echo; else echo true; fi)" >> $GITHUB_OUTPUT

  build:
    needs:
      - docker-build
      - set-inputs
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      docker-image: ${{ needs.docker-build.outputs.docker-image }}
      build: ${{ needs.set-inputs.outputs.rebuild }}

  test_full_model_passing:
    if: success() || failure()
    needs:
      - set-inputs
      - docker-build
      - build
    uses: ./.github/workflows/test-sub.yml
    secrets: inherit
    with:
      test_mark: 'nightly and not xfail'
      test_group_cnt: ${{ needs.set-inputs.outputs.test_group_cnt }}
      test_group_ids: ${{ needs.set-inputs.outputs.test_group_ids }}
      docker-image: ${{ needs.docker-build.outputs.docker-image }}
      runs-on: '[{"runs-on": "n150"}]'
      run_id: ${{ needs.build.outputs.run_id }}
      tests_to_filter: 'forge/test/models/pytorch/multimodal/llama3/test_llama3_pt.py::test_llama_vision_Instruct[meta-llama/Llama-3.2-11B-Vision-Instruct],forge/test/models/pytorch/multimodal/llama3/test_llama3_pt.py::test_llama_vision_Instruct[meta-llama/Llama-3.2-90B-Vision-Instruct],forge/test/models/pytorch/text/albert/test_albert.py::test_albert_masked_lm_pytorch[large_v2],forge/test/models/pytorch/text/albert/test_albert.py::test_albert_token_classification_pytorch[large_v1],forge/test/models/pytorch/text/bert/test_bert.py::test_bert_question_answering_pytorch[bert-large-cased-whole-word-masking-finetuned-squad],forge/test/models/pytorch/text/dpr/test_dpr.py::test_dpr_context_encoder_pytorch[facebook/dpr-ctx_encoder-single-nq-base],forge/test/models/pytorch/text/gptneo/test_gptneo.py::test_gptneo_causal_lm_pytorch[gpt_neo_2_7B],forge/test/models/pytorch/text/llama/test_llama3.py::test_llama3_causal_lm_pytorch[llama_3_2_1b],forge/test/models/pytorch/text/llama/test_llama3.py::test_llama3_sequence_classification_pytorch[llama_3_2_1b_instruct],forge/test/models/pytorch/text/mistral/test_mistral.py::test_mistral_small_24b[mistralai/Mistral-Small-24B-Instruct-2501],forge/test/models/pytorch/text/mistral/test_mistral.py::test_mistral_large[mistralai/Mistral-Large-Instruct-2411],forge/test/models/pytorch/text/mixtral/test_mixtral.py::test_mixtral_8x7b[mistralai/Mixtral-8x7B-Instruct-v0.1],forge/test/models/pytorch/text/perceiverio/test_perceiverio.py::test_perceiverio_masked_lm_pytorch[deepmind/language-perceiver],forge/test/models/pytorch/text/phi2/test_phi2.py::test_phi2_token_classification_pytorch[microsoft/phi-2],forge/test/models/pytorch/text/phi3/test_phi3_5.py::test_phi3_5_moe_causal_lm[microsoft/Phi-3.5-MoE-instruct],forge/test/models/pytorch/text/qwen/test_qwen_v3.py::test_qwen3_embedding[embedding_0_6b],forge/test/models/pytorch/vision/alexnet/test_alexnet.py::test_alexnet_torchhub,forge/test/models/pytorch/vision/autoencoder/test_autoencoder.py::test_lin