name: Model Analysis

on:
  workflow_dispatch:
    inputs:
      nightly_generation:
        description: 'Generate nightly test from the unique ops configuration across all the models'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      nightly_generation:
        description: 'Generate nightly test from the unique ops configuration across all the models'
        required: false
        type: boolean
        default: false

jobs:

  docker-build:
    uses: ./.github/workflows/build-image.yml
    secrets: inherit

  model-analysis:
    needs: docker-build
    runs-on: runner
    timeout-minutes: 10080 # Set job execution time to 7 days(default: 6 hours)

    container:
      image: ${{ needs.docker-build.outputs.docker-image }}
      options: --device /dev/tenstorrent/0
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env

    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_DISABLE_PROGRESS_BARS: 1

    steps:

      - name: Set reusable strings
        id: strings
        env:
          NIGHTLY_GENERATION: ${{ inputs.nightly_generation }}
        shell: bash
        run: |
          echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"
          echo "build-output-dir=$(pwd)/build" >> "$GITHUB_OUTPUT"
          if [ "$NIGHTLY_GENERATION" = "true" ]; then
            echo "branch-name=generate_nightly_tests" >> "$GITHUB_OUTPUT"
            echo "commit-message=Generate and update nightly tests" >> "$GITHUB_OUTPUT"
            echo "title=Generate and update nightly tests" >> "$GITHUB_OUTPUT"
            echo "body=This PR will generate nightly tests by extracting the unique ops configurations across all the pytorch models present inside the forge/test/models directory path." >> "$GITHUB_OUTPUT"
            echo "output_path=forge/test/nightly/" >> "$GITHUB_OUTPUT"
          else
            echo "branch-name=model_analysis" >> "$GITHUB_OUTPUT"
            echo "commit-message=Update model analysis documentation" >> "$GITHUB_OUTPUT"
            echo "title=Update model analysis documentation" >> "$GITHUB_OUTPUT"
            echo "body=This PR will update model analysis documentation." >> "$GITHUB_OUTPUT"
            echo "output_path=model_analysis_docs/" >> "$GITHUB_OUTPUT"
          fi

      - name: Git safe dir
        run: git config --global --add safe.directory ${{ steps.strings.outputs.work-dir }}

      - uses: actions/checkout@v4
        with:
            submodules: recursive
            fetch-depth: 0 # Fetch all history and tags
            token: ${{ env.GITHUB_TOKEN }}

      # Clean everything from submodules (needed to avoid issues
      # with cmake generated files leftover from previous builds)
      - name: Cleanup submodules
        run: |
            git submodule foreach --recursive git clean -ffdx
            git submodule foreach --recursive git reset --hard

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          create-symlink: true
          key: model-analysis-${{ runner.os }}

      - name: Build
        shell: bash
        run: |
          source env/activate
          cmake -G Ninja \
          -B ${{ steps.strings.outputs.build-output-dir }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build ${{ steps.strings.outputs.build-output-dir }}

      - name: Run Model Analysis Script
        if: ${{ !inputs.nightly_generation }}
        shell: bash
        run: |
          source env/activate
          apt-get update
          apt install -y libgl1 libglx-mesa0
          set -o pipefail # Ensures that the exit code reflects the first command that fails
          python scripts/model_analysis/run_analysis_and_generate_md_files.py \
            --test_directory_or_file_path forge/test/models/pytorch \
            --dump_failure_logs \
            --markdown_directory_path ./model_analysis_docs \
            --unique_ops_output_directory_path ./models_unique_ops_output \
            2>&1 | tee script.log

      - name: Generate nightly test
        if: ${{ inputs.nightly_generation }}
        shell: bash
        run: |
          source env/activate
          apt-get update
          apt install -y libgl1 libglx-mesa0
          set -o pipefail # Ensures that the exit code reflects the first command that fails
          python scripts/model_analysis/generate_nightly.py \
            --test_directory_or_file_path forge/test/models/pytorch \
            --unique_ops_output_directory_path ./models_unique_ops_output \
            --nightly_tests_directory_path forge/test \
            --nightly_test_package_name nightly \
            2>&1 | tee script.log

      - name: Upload Script Output Logs
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: script-outputs
          path: script.log

      - name: Upload Models Unique Ops test Failure Logs
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: unique-ops-logs
          path: ./models_unique_ops_output

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ steps.strings.outputs.branch-name }}
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          base: main
          commit-message: ${{ steps.strings.outputs.commit-message }}
          title: ${{ steps.strings.outputs.title }}
          body: ${{ steps.strings.outputs.body }}
          delete-branch: true
          token: ${{ env.GITHUB_TOKEN }}
          add-paths: |
              ${{ steps.strings.outputs.output_path }}
