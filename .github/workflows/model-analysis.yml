name: Model Analysis

on:
  workflow_dispatch:
    inputs:
      test_group_cnt:
        description: 'Test group count'
        required: false
        default: "10"
        type: choice
        options:
          - "2"
          - "4"
          - "6"
          - "8"
          - "10"
          - "12"
      runs-on:
        description: 'Runs on'
        required: false
        default: runner
        type: choice
        options:
          - runner
          - n150
          - n300
          - p150
      tests_to_filter:
        description: 'Filter specific tests (comma-separated): Generate models ops tests only for the specified test commands'
        required: false
        type: string

      ops_to_filter:
        description: 'Filter specific operations (comma-separated): Generate models ops tests only for the specified Forge operations'
        required: false
        type: string

      override_existing_ops:
        description: 'Merge with existing ops: Extract unique ops config from existing models ops tests directory, combine with new filtered tests config, then regenerate all models ops tests'
        required: false
        type: boolean
        default: false


permissions:
  packages: write
  checks: write

run-name: "Model Analysis Ops Test Generation (${{inputs.runs-on}}-${{inputs.test_group_cnt}})"

jobs:

  docker-build:
    uses: ./.github/workflows/build-image.yml
    secrets: inherit

  set-inputs:
    runs-on: ubuntu-latest
    needs: docker-build
    if: always()
    outputs:
      test_group_cnt: ${{ steps.set-inputs.outputs.test_group_cnt }}
      test_group_ids: ${{ steps.set-inputs.outputs.test_group_ids }}
      runs-on: ${{ steps.set-inputs.outputs.runs-on }}
      tests_to_filter: ${{ steps.set-inputs.outputs.tests_to_filter }}
      ops_to_filter: ${{ steps.set-inputs.outputs.ops_to_filter }}
      override_existing_ops: ${{ steps.set-inputs.outputs.override_existing_ops }}
    steps:
      - name: Inputs Management
        id: set-inputs
        run: |
          echo "test_group_cnt=${{ inputs.test_group_cnt }}" >> $GITHUB_OUTPUT
          echo "test_group_ids=[$(seq -s ',' 1 ${{ inputs.test_group_cnt }})]" >> $GITHUB_OUTPUT
          echo "runs-on=[{\"runs-on\": \"${{ inputs.runs-on }}\"}]" >> $GITHUB_OUTPUT

          # Convert tests_to_filter from comma-separated to space-separated
          if [ -n "${{ inputs.tests_to_filter }}" ] && [ "${{ inputs.tests_to_filter }}" != "" ]; then
            tests_to_filter=$(echo "${{ inputs.tests_to_filter }}" | tr ',' ' ' | xargs)
          else
            tests_to_filter=""
          fi
          echo "tests_to_filter=$tests_to_filter" >> $GITHUB_OUTPUT

          # Convert ops_to_filter from comma-separated to space-separated
          if [ -n "${{ inputs.ops_to_filter }}" ] && [ "${{ inputs.ops_to_filter }}" != "" ]; then
            ops_to_filter=$(echo "${{ inputs.ops_to_filter }}" | tr ',' ' ' | xargs)
          else
            ops_to_filter=""
          fi
          echo "ops_to_filter=$ops_to_filter" >> $GITHUB_OUTPUT

          if [[ "${{ inputs.override_existing_ops }}" == "true" && -n "$tests_to_filter" ]]; then
            echo "override_existing_ops=true" >> $GITHUB_OUTPUT
          else
            echo "override_existing_ops=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs:
      - docker-build
      - set-inputs
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      docker-image: ${{ needs.docker-build.outputs.docker-image }}
      build: 'Release'

  extract-unique-ops-configuration:
    needs:
      - docker-build
      - set-inputs
      - build
    uses: ./.github/workflows/test-model-analysis-sub.yml
    secrets: inherit
    with:
      test_mark: 'not (skip_model_analysis or out_of_memory)'
      test_group_cnt: ${{ needs.set-inputs.outputs.test_group_cnt }}
      test_group_ids: ${{ needs.set-inputs.outputs.test_group_ids }}
      docker-image: ${{ needs.docker-build.outputs.docker-image }}
      runs-on: ${{ needs.set-inputs.outputs.runs-on }}
      run_id: ${{ needs.build.outputs.run_id }}
      tests_to_filter: ${{ needs.set-inputs.outputs.tests_to_filter }}
      allow-fail: true

  generate-models-ops-tests:

    needs:
      - docker-build
      - set-inputs
      - build
      - extract-unique-ops-configuration

    runs-on: ["in-service", "${{ inputs.runs-on }}"]

    container:
      image: ${{ needs.docker-build.outputs.docker-image }}
      options: --device /dev/tenstorrent/0
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env
        - /mnt/dockercache:/mnt/dockercache

    steps:

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"
          echo "build-output-dir=$(pwd)/build" >> "$GITHUB_OUTPUT"

      - name: Git safe dir
        run: git config --global --add safe.directory ${{ steps.strings.outputs.work-dir }}

      - uses: actions/checkout@v4
        with:
            submodules: recursive
            fetch-depth: 0 # Fetch all history and tags
            token: ${{ secrets.GH_TOKEN }}

      # Clean everything from submodules (needed to avoid issues
      # with cmake generated files leftover from previous builds)
      - name: Cleanup submodules
        run: |
            git submodule foreach --recursive git clean -ffdx
            git submodule foreach --recursive git reset --hard

      - name: Set environment variables
        shell: bash
        run: |
            OUTPUT=$(bash .github/model-analysis-config.sh)
            # Assign the script output to GitHub environment variables
            echo "$OUTPUT" | while IFS= read -r line; do
              echo "$line" >> $GITHUB_ENV
            done

      - name: Download all Models Unique Ops Config artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/download-model-analysis-artifacts.sh "${{ github.repository }}" "${{ github.run_id }}" "${{ env.UNIQUE_OPS_OUTPUT_DIR_PATH }}"

      - name: Download wheel
        if: ${{ needs.build.outputs.run_id }}
        continue-on-error: true
        uses: tenstorrent/tt-forge/.github/actions/download-artifact@main
        with:
          name: forge-wheel
          run_id: ${{ needs.build.outputs.run_id }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install wheel
        shell: bash
        run: |
          source env/activate
          pip install tvm*.whl --force-reinstall
          pip install forge*.whl --force-reinstall

      - name: Generate Models Ops tests
        shell: bash
        run: |
          source env/activate
          set -o pipefail # Ensures that the exit code reflects the first command that fails

          command_args=(
            "--extracted_unique_ops_config_directory_path" "${{ env.UNIQUE_OPS_OUTPUT_DIR_PATH }}"
            "--models_ops_test_output_directory_path" "${{ env.MODELS_OPS_TEST_OUTPUT_DIR_PATH }}"
            "--models_ops_test_package_name" "${{ env.MODELS_OPS_TEST_PACKAGE_NAME }}"
          )

          ops_to_filter="${{ needs.set-inputs.outputs.ops_to_filter }}"
          override_existing_ops="${{ needs.set-inputs.outputs.override_existing_ops }}"

          if [ -n "${{ ops_to_filter }}" ] && [ "${{ ops_to_filter }}" != "" ]; then
            command_args+=("--ops_to_filter" "${{ needs.set-inputs.outputs.ops_to_filter }}")
          fi
          if [ -n "${{ override_existing_ops }}" ] && [ "${{ override_existing_ops }}" == "true"]; then
            command_args+=("--override_existing_ops")
          fi

          python scripts/model_analysis/combine_and_generate_ops_tests.py "${command_args[@]}" 2>&1 | tee ${{ env.SCRIPT_OUTPUT_LOG }}

      - name: Upload Script Output Logs
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: script-outputs
          path: ${{ env.SCRIPT_OUTPUT_LOG }}

      - name: Upload Models Unique Ops Output
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: models-unique-ops-output
          path: ${{ env.UNIQUE_OPS_OUTPUT_DIR_PATH }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ env.BRANCH_NAME }}
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          base: main
          commit-message: ${{ env.COMMIT_MESSAGE }}
          title: ${{ env.TITLE }}
          body: ${{ env.BODY }}
          delete-branch: true
          draft: true
          token: ${{ secrets.GH_TOKEN }}
          add-paths: |
              ${{ env.OUTPUT_PATH }}
