name: On Nightly Sweeps Tests

on:
  workflow_dispatch:
    inputs:
      runs-on:
        description: 'Runs on'
        required: true
        type: choice
        options:
          - n150
          - n300
        default: n150
      operators:
        description: 'Operators to test (comma separated)'
        type: string
        required: false
  schedule:
    - cron: '0 4 * * *'  # Runs at 04:00 UTC every day

jobs:
  test:
    uses: ./.github/workflows/test-sweeps.yml
    secrets: inherit
    with:
      runs-on: ${{ github.event.inputs.runs-on || 'n150' }}
      operators: ${{ github.event.inputs.operators }}
