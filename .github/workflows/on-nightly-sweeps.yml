name: On Nightly Sweeps Tests

on:
  workflow_dispatch:
    inputs:
      runs-on:
        description: 'Runs on'
        required: true
        type: choice
        options:
          - n150
          - n300
        default: n150
      operators:
        description: 'Operators to test (comma separated)'
        type: string
        required: false
      filters:
        description: 'List of filters for sweep tests (comma separated)'
        required: false
        type: string
  schedule:
    - cron: '0 4 * * *'  # Runs at 04:00 UTC every day

jobs:
  docker-build:
      uses: ./.github/workflows/build-image.yml
      secrets: inherit
  build:
    needs: docker-build
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      docker-image: ${{ needs.docker-build.outputs.docker-image }}

  test_on_dispatch:
    if: inputs.runs-on
    needs:
      - docker-build
      - build
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      test_mark: 'nightly_sweeps'
      test_group_cnt: 4
      test_group_ids: '[1,2,3,4]'
      docker-image: ${{ needs.docker-build.outputs.docker-image }}
      runs-on: '[{"runs-on": "${{ github.event.inputs.runs-on }}"}]'
      operators: ${{ github.event.inputs.operators }}
      filters: ${{ github.event.inputs.filters }}

  test_on_schedule:
    if: ${{ ! inputs.runs-on }}
    needs:
      - docker-build
      - build
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      test_mark: 'nightly_sweeps'
      test_group_cnt: 4
      test_group_ids: '[1,2,3,4]'
      docker-image: ${{ needs.docker-build.outputs.docker-image }}
      runs-on: '[{"runs-on": "n150"}]'
      operators: ""
      # filters: "SAMPLE20"  # Run sample of 20% of sweep tests on nightly run. Workaround for memory limits and issues.
